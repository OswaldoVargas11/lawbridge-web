document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Source Sans 3';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"93b984cb-20c1-438f-ab2f-c835dac5b787\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  :root {\n    --deep: #223E5B; --mid: #3D5F7A; --gray: #6D8496;\n    --teal: #0D9488; --ice: #E6EEF1;\n    --hero-len: 4.2;\n  }\n  * { box-sizing: border-box; }\n  html { scroll-behavior: smooth; }\n  @media (prefers-reduced-motion: reduce) { html { scroll-behavior: auto; } }\n  body {\n    margin: 0; font-family: 'Source Sans 3', sans-serif; color: var(--deep);\n    background: #FFFFFF; -webkit-font-smoothing: antialiased;\n  }\n  .container { max-width: 1120px; margin: 0 auto; padding: 0 32px; }\n  .skip {\n    position: absolute; left: -9999px; top: 0; z-index: 300;\n    background: var(--teal); color: #fff; padding: 10px 18px; border-radius: 0 0 8px 0;\n    font-family: 'Montserrat', sans-serif; font-weight: 600; font-size: 13px; text-decoration: none;\n  }\n  .skip:focus { left: 0; }\n\n  /* ============ NAV ============ */\n  .nav {\n    position: fixed; top: 0; left: 0; right: 0; z-index: 100;\n    transition: background 0.3s ease, box-shadow 0.3s ease;\n  }\n  .nav-inner { display: flex; align-items: center; justify-content: space-between; gap: 24px; height: 72px; }\n  .nav-logo { display: flex; align-items: center; gap: 13px; text-decoration: none; }\n  .nav-word {\n    font-family: 'Montserrat', sans-serif; font-weight: 600; font-size: 16px;\n    letter-spacing: 0.22em; text-transform: uppercase; color: var(--ice); transition: color 0.3s;\n  }\n  .nav-logo svg line, .nav-logo svg path.deck { transition: stroke 0.3s; }\n  .nav-links { display: flex; align-items: center; gap: 28px; }\n  .nav-links a {\n    font-family: 'Montserrat', sans-serif; font-weight: 500; font-size: 13px; letter-spacing: 0.06em;\n    color: rgba(230,238,241,0.85); text-decoration: none; transition: color 0.2s;\n  }\n  .nav-links a:hover, .nav-links a:focus-visible { color: #FFFFFF; }\n  .nav.scrolled { background: rgba(255,255,255,0.92); backdrop-filter: blur(12px); box-shadow: 0 1px 0 rgba(34,62,91,0.08); }\n  .nav.scrolled .nav-word { color: var(--deep); }\n  .nav.scrolled .nav-links a { color: var(--mid); }\n  .nav.scrolled .nav-links a:hover, .nav.scrolled .nav-links a:focus-visible { color: var(--deep); }\n  .nav.scrolled .nav-logo svg line { stroke: var(--deep); }\n\n  /* ============ BOTONES ============ */\n  .btn {\n    display: inline-block; font-family: 'Montserrat', sans-serif; font-weight: 600;\n    font-size: 14px; letter-spacing: 0.04em; border: none; border-radius: 8px;\n    padding: 15px 30px; cursor: pointer; text-decoration: none; text-align: center;\n    transition: transform 0.15s ease, box-shadow 0.15s ease;\n  }\n  .btn-primary { color: #FFFFFF; background: var(--teal); }\n  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(13,148,136,0.35); }\n  .btn-primary:active { transform: none; }\n  .btn-primary:focus-visible { outline: 3px solid #5EEAD4; outline-offset: 2px; }\n  .btn-sm { padding: 10px 20px; font-size: 12.5px; }\n\n  /* ============ HERO ============ */\n  .hero { height: calc(var(--hero-len) * 100vh); position: relative; }\n  .hero-sticky {\n    position: sticky; top: 0; height: 100vh; height: 100svh; overflow: hidden;\n    background: linear-gradient(180deg, #15293E 0%, #223E5B 56%, #2C4A68 100%);\n    display: flex; flex-direction: column;\n  }\n  .hero-copy {\n    position: absolute; left: 0; right: 0; top: 16vh; top: 16svh; z-index: 5;\n    display: flex; flex-direction: column; align-items: center; gap: 0;\n    text-align: center; padding: 0 24px; pointer-events: none;\n  }\n  .hero-kicker {\n    font-family: 'Montserrat', sans-serif; font-weight: 500; font-size: 12px;\n    letter-spacing: 0.3em; text-transform: uppercase; color: rgba(230,238,241,0.6); margin: 0 0 18px;\n  }\n  .hero h1 {\n    font-family: 'Montserrat', sans-serif; font-weight: 600;\n    font-size: clamp(30px, 4.6vw, 56px); line-height: 1.16; letter-spacing: -0.01em;\n    color: #FFFFFF; margin: 0 0 18px; max-width: 820px; text-wrap: balance;\n  }\n  .hero h1 em { font-style: normal; color: #2DD4BF; }\n  .hero-tag {\n    font-family: 'Montserrat', sans-serif; font-weight: 500; font-size: clamp(13px, 1.4vw, 16px);\n    letter-spacing: 0.12em; color: rgba(230,238,241,0.75); margin: 0;\n  }\n  .hero-cta {\n    margin-top: 34px; opacity: 0; visibility: hidden; transform: translateY(18px);\n    pointer-events: auto;\n  }\n  @media (prefers-reduced-motion: no-preference) {\n    .hero-copy > * { opacity: 0; transform: translateY(14px); animation: heroIn 0.9s ease 0.2s forwards; }\n    .hero-copy > .hero-tag { animation-delay: 0.45s; }\n    .hero-copy > .hero-cta { animation: none; }\n    @keyframes heroIn { to { opacity: 1; transform: none; } }\n  }\n  .bridge-wrap { position: absolute; left: 0; right: 0; bottom: 0; height: 62vh; height: 62svh; }\n  .bridge-wrap svg { width: 100%; height: 100%; display: block; }\n  .hero-hint {\n    position: absolute; bottom: 26px; left: 50%; transform: translateX(-50%); z-index: 6;\n    display: flex; flex-direction: column; align-items: center; gap: 8px;\n    font-family: 'Montserrat', sans-serif; font-weight: 500; font-size: 11px;\n    letter-spacing: 0.26em; text-transform: uppercase; color: rgba(230,238,241,0.55);\n  }\n  .hero-hint .hint-line { width: 1.5px; height: 34px; background: rgba(230,238,241,0.35); overflow: hidden; position: relative; }\n  @media (prefers-reduced-motion: no-preference) {\n    .hero-hint .hint-line::after {\n      content: \"\"; position: absolute; left: 0; top: -100%; width: 100%; height: 100%;\n      background: var(--teal); animation: hintDrop 1.8s ease-in-out infinite;\n    }\n    @keyframes hintDrop { 0% { top: -100%; } 60% { top: 100%; } 100% { top: 100%; } }\n  }\n\n  /* trazos del puente */\n  .st { stroke: var(--ice); fill: none; stroke-linecap: round; }\n  .draw { stroke-dasharray: 1; stroke-dashoffset: 1; }\n  .hg { opacity: 0; transform-box: fill-box; transform-origin: top center; transform: scaleY(0); }\n  .dotR { opacity: 0; }\n  .glow { opacity: 0; transform-box: fill-box; transform-origin: center; }\n\n  /* ============ SECCIONES ============ */\n  section { padding: 110px 0; }\n  .kicker {\n    display: block; font-family: 'Montserrat', sans-serif; font-weight: 500; font-size: 12px;\n    letter-spacing: 0.24em; text-transform: uppercase; color: var(--teal); margin-bottom: 16px;\n  }\n  .h2 {\n    font-family: 'Montserrat', sans-serif; font-weight: 600; font-size: clamp(26px, 3.2vw, 38px);\n    line-height: 1.2; color: var(--deep); margin: 0 0 18px; letter-spacing: -0.01em;\n    text-wrap: balance; max-width: 680px;\n  }\n  .lead { font-size: 17.5px; line-height: 1.65; color: var(--gray); margin: 0 0 0; max-width: 620px; text-wrap: pretty; }\n  .body-txt { font-size: 16.5px; line-height: 1.7; color: var(--mid); margin: 0 0 18px; text-wrap: pretty; }\n\n  @media (prefers-reduced-motion: no-preference) {\n    .rv { opacity: 0; transform: translateY(26px); transition: opacity 0.7s ease, transform 0.7s ease; }\n    .rv.in { opacity: 1; transform: none; }\n    .rv.d1 { transition-delay: 0.08s; } .rv.d2 { transition-delay: 0.16s; } .rv.d3 { transition-delay: 0.24s; }\n    .rv.d4 { transition-delay: 0.32s; } .rv.d5 { transition-delay: 0.4s; }\n  }\n\n  /* sobre */\n  .about { display: grid; grid-template-columns: 420px 1fr; gap: 72px; align-items: center; }\n  .about image-slot { width: 100%; height: auto; aspect-ratio: 4 / 4.6; display: block; }\n  .about-points { list-style: none; margin: 28px 0 0; padding: 0; display: flex; flex-direction: column; gap: 14px; }\n  .about-points li { display: flex; gap: 12px; align-items: baseline; font-size: 16px; line-height: 1.55; color: var(--deep); }\n  .about-points svg { flex-shrink: 0; position: relative; top: 1px; }\n\n  /* áreas */\n  .areas { background: var(--ice); }\n  .area-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; margin-top: 52px; }\n  .area-card {\n    background: #FFFFFF; border: 1.5px solid rgba(34,62,91,0.08); border-radius: 14px;\n    padding: 28px 26px 24px; display: flex; flex-direction: column; gap: 10px;\n    transition: transform 0.18s ease, box-shadow 0.18s ease;\n  }\n  .area-card:hover { transform: translateY(-3px); box-shadow: 0 10px 28px rgba(34,62,91,0.1); }\n  .area-card svg { margin-bottom: 6px; }\n  .area-card h3 { font-family: 'Montserrat', sans-serif; font-weight: 600; font-size: 17px; color: var(--deep); margin: 0; }\n  .area-card p { font-size: 15px; line-height: 1.6; color: var(--gray); margin: 0; text-wrap: pretty; }\n\n  /* método */\n  .steps { display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px; margin-top: 56px; position: relative; }\n  .steps::before {\n    content: \"\"; position: absolute; top: 24px; left: 8%; right: 8%; height: 1.5px;\n    background: linear-gradient(90deg, transparent, #C4D3DC 12%, #C4D3DC 88%, transparent);\n  }\n  .step { display: flex; flex-direction: column; gap: 14px; position: relative; }\n  .step-n {\n    width: 48px; height: 48px; border-radius: 50%; background: #FFFFFF;\n    border: 1.5px solid #C4D3DC; display: flex; align-items: center; justify-content: center;\n    font-family: 'Montserrat', sans-serif; font-weight: 600; font-size: 14px; color: var(--teal);\n  }\n  .step h3 { font-family: 'Montserrat', sans-serif; font-weight: 600; font-size: 18px; color: var(--deep); margin: 6px 0 0; }\n  .step p { font-size: 15.5px; line-height: 1.65; color: var(--gray); margin: 0; text-wrap: pretty; }\n\n  /* contacto */\n  .contact-sec { background: linear-gradient(180deg, #182E47 0%, #223E5B 100% sm\" x1=\"800\" y1=\"224\" x2=\"800\" y2=\"380\"><\u002Fline>\n          <line class=\"hg g4\" x1=\"720\" y1=\"218\" x2=\"720\" y2=\"380\"><\u002Fline>\n        <\u002Fg>\n\n        <!-- punto de unión -->\n        <g id=\"glow\" class=\"glow\">\n          <circle cx=\"720\" cy=\"218\" r=\"46\" fill=\"url(#glowGrad)\"><\u002Fcircle>\n          <circle cx=\"720\" cy=\"218\" r=\"6\" fill=\"#2DD4BF\"><\u002Fcircle>\n        <\u002Fg>\n      <\u002Fsvg>\n    <\u002Fdiv>\n\n    <div class=\"hero-hint\" id=\"heroHint\" aria-hidden=\"true\">\n      <span>Desliza<\u002Fspan>\n      <span class=\"hint-line\"><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ SOBRE ============ -->\n<section id=\"sobre\" data-screen-label=\"Sobre el despacho\">\n  <div class=\"container about\">\n    <div class=\"rv\">\n      <image-slot id=\"about-photo\" shape=\"rounded\" radius=\"16\" placeholder=\"Foto del equipo o del despacho\"><\u002Fimage-slot>\n    <\u002Fdiv>\n    <div>\n      <span class=\"kicker rv\">Sobre el despacho<\u002Fspan>\n      <h2 class=\"h2 rv d1\">Un despacho pensado para unir, no para enfrentar.<\u002Fh2>\n      <p class=\"body-txt rv d2\">En Lawbridge entendemos cada asunto legal como dos orillas que necesitan conectarse: su situación actual y la solución que busca. Nuestro trabajo es construir ese puente con rigor técnico, comunicación clara y plazos realistas.<\u002Fp>\n      <ul class=\"about-points\">\n        <li class=\"rv d3\">\n          <svg width=\"18\" height=\"10\" viewBox=\"0 0 18 10\" aria-hidden=\"true\"><path d=\"M2 9 Q9 -3 16 9\" stroke=\"#0D9488\" stroke-width=\"2\" stroke-linecap=\"round\" fill=\"none\"><\u002Fpath><\u002Fsvg>\n          Trato directo: siempre sabrá quién lleva su asunto y en qué punto está.\n        <\u002Fli>\n        <li class=\"rv d4\">\n          <svg width=\"18\" height=\"10\" viewBox=\"0 0 18 10\" aria-hidden=\"true\"><path d=\"M2 9 Q9 -3 16 9\" stroke=\"#0D9488\" stroke-width=\"2\" stroke-linecap=\"round\" fill=\"none\"><\u002Fpath><\u002Fsvg>\n          Honorarios cerrados por escrito antes de empezar, sin sorpresas.\n        <\u002Fli>\n        <li class=\"rv d5\">\n          <svg width=\"18\" height=\"10\" viewBox=\"0 0 18 10\" aria-hidden=\"true\"><path d=\"M2 9 Q9 -3 16 9\" stroke=\"#0D9488\" stroke-width=\"2\" stroke-linecap=\"round\" fill=\"none\"><\u002Fpath><\u002Fsvg>\n          Preferencia por el acuerdo; firmeza en el litigio cuando es necesario.\n        <\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ ÁREAS ============ -->\n<section class=\"areas\" id=\"areas\" data-screen-label=\"Áreas de práctica\">\n  <div class=\"container\">\n    <span class=\"kicker rv\">Áreas de práctica<\u002Fspan>\n    <h2 class=\"h2 rv d1\">Donde construimos puentes.<\u002Fh2>\n    <p class=\"lead rv d2\">Asesoramiento integral para particulares y empresas, con un equipo especializado en cada área.<\u002Fp>\n    <div class=\"area-grid\">\n      <article class=\"area-card rv\">\n        <svg width=\"26\" height=\"14\" viewBox=\"0 0 26 14\" aria-hidden=\"true\"><path d=\"M2 13 Q13 -4 24 13\" stroke=\"#0D9488\" stroke-width=\"2\" stroke-linecap=\"round\" fill=\"none\"><\u002Fpath><\u002Fsvg>\n        <h3>Mercantil y societario<\u002Fh3>\n        <p>Constitución de sociedades, pactos de socios, contratación mercantil y operaciones corporativas.<\u002Fp>\n      <\u002Farticle>\n      <article class=\"area-card rv d1\">\n        <svg width=\"26\" height=\"14\" viewBox=\"0 0 26 14\" aria-hidden=\"true\"><path d=\"M2 13 Q13 -4 24 13\" stroke=\"#0D9488\" stroke-width=\"2\" stroke-linecap=\"round\" fill=\"none\"><\u002Fpath><\u002Fsvg>\n        <h3>Laboral<\u002Fh3>\n        <p>Contratación, despidos, negociación colectiva y asesoría continua a departamentos de personas.<\u002Fp>\n      <\u002Farticle>\n      <article class=\"area-card rv d2\">\n        <svg width=\"26\" height=\"14\" viewBox=\"0 0 26 14\" aria-hidden=\"true\"><path d=\"M2 13 Q13 -4 24 13\" stroke=\"#0D9488\" stroke-width=\"2\" stroke-linecap=\"round\" fill=\"none\"><\u002Fpath><\u002Fsvg>\n        <h3>Civil y contratos<\u002Fh3>\n        <p>Obligaciones y contratos, responsabilidad civil, familia y sucesiones con enfoque preventivo.<\u002Fp>\n      <\u002Farticle>\n      <article class=\"area-card rv d3\">\n        <svg width=\"26\" height=\"14\" viewBox=\"0 0 26 14\" aria-hidden=\"true\"><path d=\"M2 13 Q13 -4 24 13\" stroke=\"#0D9488\" stroke-width=\"2\" stroke-linecap=\"round\" fill=\"none\"><\u002Fpath><\u002Fsvg>\n        <h3>Fiscal y administrativo<\u002Fh3>\n        <p>Planificación fiscal, inspecciones, recursos y relaciones con la administración pública.<\u002Fp>\n      <\u002Farticle>\n      <article class=\"area-card rv d4\">\n        <svg width=\"26\" height=\"14\" viewBox=\"0 0 26 14\" aria-hidden=\"true\"><path d=\"M2 13 Q13 -4 24 13\" stroke=\"#0D9488\" stroke-width=\"2\" stroke-linecap=\"round\" fill=\"none\"><\u002Fpath><\u002Fsvg>\n        <h3>Inmobiliario<\u002Fh3>\n        <p>Compraventas, arrendamientos, urbanismo y due diligence de activos inmobiliarios.<\u002Fp>\n      <\u002Farticle>\n      <article class=\"area-card rv d5\">\n        <svg width=\"26\" height=\"14\" viewBox=\"0 0 26 14\" aria-hidden=\"true\"><path d=\"M2 13 Q13 -4 24 13\" stroke=\"#0D9488\" stroke-width=\"2\" stroke-linecap=\"round\" fill=\"none\"><\u002Fpath><\u002Fsvg>\n        <h3>Mediación y litigación<\u002Fh3>\n        <p>Resolución de conflictos: primero el acuerdo; si no es posible, defensa procesal sólida.<\u002Fp>\n      <\u002Farticle>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ MÉTODO ============ -->\n<section id=\"metodo\" data-screen-label=\"Cómo trabajamos\">\n  <div class=\"container\">\n    <span class=\"kicker rv\">Cómo trabajamos<\u002Fspan>\n    <h2 class=\"h2 rv d1\">Tres pasos, un puente.<\u002Fh2>\n    <p class=\"lead rv d2\">El mismo método en cada asunto: entender, planificar y ejecutar.<\u002Fp>\n    <div class=\"steps\">\n      <div class=\"step rv d1\">\n        <span class=\"step-n\">01<\u002Fspan>\n        <h3>Escuchamos<\u002Fh3>\n        <p>Una primera consulta para entender su situación, los riesgos y lo que de verdad necesita conseguir.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"step rv d2\">\n        <span class=\"step-n\">02<\u002Fspan>\n        <h3>Trazamos el plan<\u002Fh3>\n        <p>Estrategia por escrito con opciones, plazos estimados y honorarios cerrados. Usted decide con toda la información.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"step rv d3\">\n        <span class=\"step-n\">03<\u002Fspan>\n        <h3>Construimos la solución<\u002Fh3>\n        <p>Ejecutamos el plan y le acompañamos hasta el cierre, con información puntual en cada hito del proceso.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ CONTACTO ============ -->\n<section class=\"contact-sec\" id=\"contacto\" data-screen-label=\"Contacto\">\n  <div class=\"container contact\">\n    <div>\n      <span class=\"kicker rv\">Contacto<\u002Fspan>\n      <h2 class=\"h2 rv d1\">Reserva una consulta.<\u002Fh2>\n      <p class=\"lead rv d2\">Cuéntenos su caso y le responderemos en menos de 24 horas laborables para proponerle día y hora.<\u002Fp>\n      <div class=\"contact-data rv d3\">\n        <div>\n          <span class=\"cd-label\">Teléfono<\u002Fspan>\n          <span class=\"cd-value\"><a href=\"tel:+34910000000\">+34 910 000 000<\u002Fa><\u002Fspan>\n        <\u002Fdiv>\n        <div>\n          <span class=\"cd-label\">Email<\u002Fspan>\n          <span class=\"cd-value\"><a href=\"mailto:hola@lawbridge.es\">hola@lawbridge.es<\u002Fa><\u002Fspan>\n        <\u002Fdiv>\n        <div>\n          <span class=\"cd-label\">Despacho<\u002Fspan>\n          <span class=\"cd-value\">Paseo de la Castellana 100, Madrid<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <form class=\"form-card rv d2\" id=\"contactForm\" novalidate=\"novalidate\">\n      <div class=\"field\">\n        <span><label for=\"f-nombre\">Nombre<\u002Flabel><\u002Fspan>\n        <input id=\"f-nombre\" name=\"nombre\" type=\"text\" autocomplete=\"name\" required=\"required\">\n        <em id=\"e-nombre\" hidden=\"hidden\">Escriba su nombre.<\u002Fem>\n      <\u002Fdiv>\n      <div class=\"field\">\n        <span><label for=\"f-email\">Email<\u002Flabel><\u002Fspan>\n        <input id=\"f-email\" name=\"email\" type=\"email\" autocomplete=\"email\" required=\"required\">\n        <em id=\"e-email\" hidden=\"hidden\">Escriba un email válido.<\u002Fem>\n      <\u002Fdiv>\n      <div class=\"field\">\n        <span><label for=\"f-msg\">¿En qué podemos ayudarle?<\u002Flabel><\u002Fspan>\n        <textarea id=\"f-msg\" name=\"mensaje\" rows=\"4\" required=\"required\"><\u002Ftextarea>\n        <em id=\"e-msg\" hidden=\"hidden\">Cuéntenos brevemente su caso.<\u002Fem>\n      <\u002Fdiv>\n      <button class=\"btn btn-primary\" type=\"submit\" style=\"width: 100%;\">Enviar solicitud<\u002Fbutton>\n    <\u002Fform>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<footer>\n  <div class=\"container foot\">\n    <div class=\"foot-brand\">\n      <svg width=\"48\" height=\"24\" viewBox=\"0 0 72 36\" fill=\"none\" aria-hidden=\"true\">\n        <line x1=\"4\" y1=\"28\" x2=\"68\" y2=\"28\" stroke=\"#E6EEF1\" stroke-width=\"2\" stroke-linecap=\"round\"><\u002Fline>\n        <path d=\"M8 28 Q36 2 64 28\" stroke=\"#0D9488\" stroke-width=\"2\" stroke-linecap=\"round\" fill=\"none\"><\u002Fpath>\n        <line x1=\"29\" y1=\"15.8\" x2=\"29\" y2=\"28\" stroke=\"#E6EEF1\" stroke-width=\"1.4\" stroke-linecap=\"round\"><\u002Fline>\n        <line x1=\"36\" y1=\"15\" x2=\"36\" y2=\"28\" stroke=\"#E6EEF1\" stroke-width=\"1.4\" stroke-linecap=\"round\"><\u002Fline>\n        <line x1=\"43\" y1=\"15.8\" x2=\"43\" y2=\"28\" stroke=\"#E6EEF1\" stroke-width=\"1.4\" stroke-linecap=\"round\"><\u002Fline>\n      <\u002Fsvg>\n      <span class=\"foot-word\">Lawbridge<\u002Fspan>\n    <\u002Fdiv>\n    <span class=\"foot-tag\">Connecting people. Resolving matters. Building trust.<\u002Fspan>\n    <span class=\"foot-copy\">© 2026 Lawbridge Abogados<\u002Fspan>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n\n\n<script src=\"7c410d5a-91da-4a4d-8203-a69f1924500c\"><\u002Fscript>\n<script>\n(function () {\n  var reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n  var $ = function (id) { return document.getElementById(id); };\n\n  /* ---------- nav ---------- */\n  var nav = $('nav');\n  var hero = $('hero');\n\n  /* ---------- escenas del puente ---------- */\n  function seg(p, a, b) { return Math.min(1, Math.max(0, (p - a) / (b - a))); }\n  function easeIO(t) { return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2; }\n\n  var draws = {\n    fndL:  [0.03, 0.10], fndR:  [0.05, 0.12],\n    pierL: [0.08, 0.24], pierR: [0.10, 0.26],\n    abutL: [0.06, 0.16], abutR: [0.08, 0.18],\n    arcL:  [0.24, 0.56], arcR:  [0.24, 0.56],\n    deckL: [0.54, 0.74], deckR: [0.54, 0.74]\n  };\n  var drawEls = {};\n  Object.keys(draws).forEach(function (id) { drawEls[id] = $(id); });\n  var hangerGroups = [];\n  for (var i = 0; i <= 4; i++) hangerGroups.push(document.querySelectorAll('.hg.g' + i));\n  var glow = $('glow'), dotR = $('dotR'), cta = $('heroCta'), hint = $('heroHint');\n\n  function apply(p) {\n    Object.keys(draws).forEach(function (id) {\n      var v = easeIO(seg(p, draws[id][0], draws[id][1]));\n      drawEls[id].style.strokeDashoffset = String(1 - v);\n    });\n    for (var i = 0; i < hangerGroups.length; i++) {\n      var v = seg(p, 0.60 + i * 0.05, 0.66 + i * 0.05);\n      for (var j = 0; j < hangerGroups[i].length; j++) {\n        var el = hangerGroups[i][j];\n        el.style.opacity = String(v);\n        el.style.transform = 'scaleY(' + v + ')';\n      }\n    }\n    var g = seg(p, 0.80, 0.90);\n    glow.style.opacity = String(g);\n    glow.style.transform = 'scale(' + (0.55 + 0.45 * g) + ')';\n    dotR.style.opacity = String(seg(p, 0.78, 0.86));\n    var c = easeIO(seg(p, 0.88, 0.98));\n    cta.style.opacity = String(c);\n    cta.style.visibility = c > 0.02 ? 'visible' : 'hidden';\n    cta.style.transform = 'translateY(' + (18 * (1 - c)) + 'px)';\n    if (hint) hint.style.opacity = String(1 - seg(p, 0.01, 0.07));\n  }\n\n  if (reduced) {\n    apply(1);\n  } else {\n    var ticking = false;\n    function onScroll() {\n      if (ticking) return;\n      ticking = true;\n      requestAnimationFrame(function () {\n        ticking = false;\n        var max = hero.offsetHeight - window.innerHeight;\n        var p = max > 0 ? Math.min(1, Math.max(0, -hero.getBoundingClientRect().top / max)) : 1;\n        apply(p);\n        nav.classList.toggle('scrolled', hero.getBoundingClientRect().bottom <= 80);\n      });\n    }\n    window.addEventListener('scroll', onScroll, { passive: true });\n    window.addEventListener('resize', onScroll, { passive: true });\n    onScroll();\n  }\n  if (reduced) {\n    window.addEventListener('scroll', function () {\n      nav.classList.toggle('scrolled', hero.getBoundingClientRect().bottom <= 80);\n    }, { passive: true });\n  }\n\n  /* ---------- reveal de secciones ---------- */\n  var rvs = document.querySelectorAll('.rv');\n  if (!reduced && 'IntersectionObserver' in window) {\n    var io = new IntersectionObserver(function (entries) {\n      entries.forEach(function (e) {\n        if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); }\n      });\n    }, { threshold: 0.15, rootMargin: '0px 0px -8% 0px' });\n    rvs.forEach(function (el) { io.observe(el); });\n  } else {\n    rvs.forEach(function (el) { el.classList.add('in'); });\n  }\n\n  /* ---------- formulario ---------- */\n  var form = $('contactForm');\n  form.addEventListener('submit', function (ev) {\n    ev.preventDefault();\n    var ok = true;\n    function check(inputId, errId, valid) {\n      var inp = $(inputId), err = $(errId);\n      var good = valid(inp.value.trim());\n      inp.classList.toggle('err', !good);\n      err.hidden = good;\n      if (!good) ok = false;\n      return good;\n    }\n    check('f-nombre', 'e-nombre', function (v) { return v.length > 1; });\n    check('f-email', 'e-email', function (v) { return /^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/.test(v); });\n    check('f-msg', 'e-msg', function (v) { return v.length > 5; });\n    if (!ok) return;\n    form.innerHTML =\n      '<div class=\"form-ok\" role=\"status\">' +\n      '<svg width=\"44\" height=\"24\" viewBox=\"0 0 44 24\" aria-hidden=\"true\"><path d=\"M4 22 Q22 -8 40 22\" stroke=\"#0D9488\" stroke-width=\"2.5\" stroke-linecap=\"round\" fill=\"none\"><\u002Fpath><\u002Fsvg>' +\n      '<strong>Solicitud enviada<\u002Fstrong>' +\n      '<p>Gracias por confiar en Lawbridge. Le responderemos en menos de 24&nbsp;horas laborables.<\u002Fp>' +\n      '<\u002Fdiv>';\n  });\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
